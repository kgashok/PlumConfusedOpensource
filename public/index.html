<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.png">

    <!-- PWA meta -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Social for SaveSoil">

    <title>Social for SaveSoil</title>

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/components.css" />

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/search.js"></script>
    <script src="/js/unDates.js" defer></script>
    <script src="/js/main.js" defer></script>
</head>
<body>
    <div class="page-wrapper">

        <!-- ── Main Card ──────────────────────────────────────────── -->
        <div class="main-card">

            <!-- Header -->
            <div class="card-header">
                <div class="title-group">
                    <img src="/favicon.ico" alt="SaveSoil Logo"
                         class="app-logo"
                         onclick="javascript:location.reload(true)" />
                    <div>
                        <div class="title-row">
                            <h1 class="app-title">Social for SaveSoil</h1>
                            <button onclick="toggleInfo()" class="icon-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                        <a href="https://saythanks.io/to/lifebalance&SaveSoilApp"
                           target="_blank"
                           class="feedback-link">Feedback?</a>
                    </div>
                </div>
                <div class="time-display">
                    <div id="currentTime"></div>
                </div>
            </div>

            <!-- Auth status banners -->
            <div id="authStatus" class="mb-6 p-4 rounded-lg hidden"></div>
            <div id="userInfo" class="mb-6 hidden"></div>

            <!-- Auth button -->
            <div class="mb-6">
                <button onclick="startAuth()" class="btn-primary">
                    Authenticate with Twitter
                </button>
            </div>

            <!-- Tweet Composer -->
            <div class="mb-6">
                <!-- Text input -->
                <div class="textarea-wrapper">
                    <textarea id="tweetText"
                              class="tweet-textarea"
                              rows="5"
                              placeholder="What's happening?"
                              maxlength="280"></textarea>
                    <div id="charCount" class="char-counter">280</div>
                </div>

                <!-- Image upload -->
                <div id="imageUploadSection">
                    <input type="file" id="tweetImage" accept="image/*"
                           class="hidden" onchange="handleImageSelect(event)" />
                    <div class="upload-row">
                        <button onclick="document.getElementById('tweetImage').click()"
                                class="upload-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </button>
                        <div id="selectedImage" class="hidden">
                            <img id="imagePreview" class="image-preview" />
                            <button onclick="removeImage()" class="remove-image-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="composer-actions">
                    <button onclick="postTweet()" class="btn-primary">
                        Post Tweet
                    </button>
                    <div class="action-links">
                        <button onclick="toggleInspiration()"
                                class="link-btn link-btn--blue">Need inspiration?</button>
                        <button onclick="showFunnyPrompt()"
                                class="link-btn link-btn--purple">Funny Prompt</button>
                        <button onclick="askChatGPT()"
                                class="link-btn link-btn--green">Ask ChatGPT</button>
                        <button id="createImageLink" onclick="showImagePrompt()"
                                class="link-btn link-btn--yellow hidden">Create Image</button>
                        <button id="imagineLink" onclick="showImaginePrompt()"
                                class="link-btn link-btn--pink hidden">Imagine</button>
                    </div>
                </div>
            </div>

            <!-- Status & Elm search mount point -->
            <div id="status" class="text-sm"></div>
            <div id="elm-search" class="mt-6"></div>
        </div>
        <!-- ── End Main Card ────────────────────────────────────────── -->

        <!-- Layout toggle -->
        <div class="layout-toggle-row">
            <button onclick="toggleLayout()" id="layoutToggle" class="btn-pill">
                Toggle Layout
            </button>
        </div>

        <!-- ── Tweet Lists ────────────────────────────────────────── -->
        <div id="listsContainer">

            <!-- #SaveSoil Tweets -->
            <div class="section-card">
                <div class="section-header"
                     onclick="toggleSection('searchedTweets')">
                    <div class="section-title-group">
                        <button onclick="showSectionInfo('savesoil', event);"
                                class="icon-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                            </svg>
                        </button>
                        <h2 class="section-title">#SaveSoil Tweets</h2>
                        <svg id="savesoilArrow" class="collapse-arrow"
                             fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="creditBalance"
                              class="credit-badge hidden"></span>
                        <a id="xCreditsLink"
                           href="https://console.x.com/accounts/1037433829038874625/billing/credits"
                           target="_blank"
                           class="x-credits-link hidden"
                           title="View X developer credits">X Credits</a>
                        <button id="refreshButton"
                                onclick="fetchSearchedTweets(); event.stopPropagation();"
                                class="btn-refresh"
                                disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                            Fetch latest
                        </button>
                    </div>
                </div>
                <div id="searchedTweets" class="section-body hidden"></div>
            </div>

            <!-- Tweet History -->
            <div class="section-card">
                <div class="section-header"
                     onclick="toggleSection('tweetHistory')">
                    <div class="section-title-group">
                        <h2 class="section-title">Tweet History</h2>
                        <svg id="historyArrow" class="collapse-arrow"
                             fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                    <button onclick="refreshHistory(); event.stopPropagation();"
                            class="btn-refresh">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        Refresh
                    </button>
                </div>
                <div id="tweetHistory" class="section-body hidden"></div>
            </div>

        </div>
        <!-- ── End Tweet Lists ──────────────────────────────────────── -->

    </div>

    <!-- ── Modals (top-level) ────────────────────────────────────── -->

    <!-- Info Modal -->
    <div id="infoModal" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="toggleInfo()" class="modal-close">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div id="infoContent" class="prose"></div>
        </div>
    </div>

    <!-- Inspiration / ChatGPT / Image Modal -->
    <div id="inspirationModal" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="toggleInspiration()" class="modal-close">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div class="prose">
                <div id="promptSection">
                    <h2>ChatGPT Prompt</h2>
                    <div class="bg-gray-50 p-4 rounded-lg mb-4">
                        <p id="gptPrompt" class="text-gray-800"></p>
                    </div>
                    <button onclick="sendToChatGPT()"
                            class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded mb-4">
                        Send to ChatGPT
                    </button>
                </div>
                <div id="responseSection" class="hidden">
                    <h3 class="mt-4">ChatGPT Response</h3>
                    <div class="bg-green-50 p-4 rounded-lg relative">
                        <p id="gptResponse" class="text-green-800"></p>
                        <button onclick="copyResponse()"
                                class="absolute top-2 right-2 text-green-600 hover:text-green-700">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"></path>
                                <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── End Modals ──────────────────────────────────────────────── -->

</body>
</html>
