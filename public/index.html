<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.png">

    <!-- PWA meta -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Social for SaveSoil">

    <title>Social for SaveSoil</title>

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/components.css" />

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/search.js"></script>
    <script src="/js/unDates.js" defer></script>
    <script src="/js/main.js" defer></script>
</head>
<body>
    <div class="page-wrapper">

        <!-- ── Main Card ──────────────────────────────────────────── -->
        <div class="main-card">

            <!-- Header -->
            <div class="card-header">
                <div class="title-group">
                    <img src="/favicon.ico" alt="SaveSoil Logo"
                         class="app-logo"
                         onclick="javascript:location.reload(true)" />
                    <div>
                        <div class="title-row">
                            <h1 class="app-title">Social for SaveSoil</h1>
                            <button onclick="toggleInfo()" class="icon-btn">
                                <svg aria-hidden="true">
                                    <use href="/icons/icons.svg#icon-info"></use>
                                </svg>
                            </button>
                        </div>
                        <a href="https://saythanks.io/to/lifebalance&SaveSoilApp"
                           target="_blank"
                           class="feedback-link">Feedback?</a>
                    </div>
                </div>
                <div class="time-display">
                    <div id="currentTime"></div>
                </div>
            </div>

            <!-- Auth status banners -->
            <div id="authStatus" class="mb-6 p-4 rounded-lg hidden"></div>
            <div id="userInfo" class="mb-6 hidden"></div>

            <!-- Auth button -->
            <div class="mb-6">
                <button onclick="startAuth()" class="btn-primary">
                    Authenticate with Twitter
                </button>
            </div>

            <!-- Tweet Composer -->
            <div class="mb-6">
                <!-- Text input -->
                <div class="textarea-wrapper">
                    <textarea id="tweetText"
                              class="tweet-textarea"
                              rows="5"
                              placeholder="What's happening?"
                              maxlength="280"></textarea>
                    <div id="charCount" class="char-counter">280</div>
                </div>

                <!-- Image upload -->
                <div id="imageUploadSection">
                    <input type="file" id="tweetImage" accept="image/*"
                           class="hidden" onchange="handleImageSelect(event)" />
                    <div class="upload-row">
                        <button onclick="document.getElementById('tweetImage').click()"
                                class="upload-btn">
                            <svg aria-hidden="true">
                                <use href="/icons/icons.svg#icon-photo"></use>
                            </svg>
                        </button>
                        <div id="selectedImage" class="hidden">
                            <img id="imagePreview" class="image-preview" />
                            <button onclick="removeImage()" class="remove-image-btn">
                                <svg aria-hidden="true">
                                    <use href="/icons/icons.svg#icon-x-circle"></use>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="composer-actions">
                    <button onclick="postTweet()" class="btn-primary">
                        Post Tweet
                    </button>
                    <div class="action-links">
                        <button onclick="toggleInspiration()"
                                class="link-btn link-btn--blue">Need inspiration?</button>
                        <button onclick="showFunnyPrompt()"
                                class="link-btn link-btn--purple">Funny Prompt</button>
                        <button onclick="askChatGPT()"
                                class="link-btn link-btn--green">Ask ChatGPT</button>
                        <button id="createImageLink" onclick="showImagePrompt()"
                                class="link-btn link-btn--yellow hidden">Create Image</button>
                        <button id="imagineLink" onclick="showImaginePrompt()"
                                class="link-btn link-btn--pink hidden">Imagine</button>
                    </div>
                </div>
            </div>

            <!-- Status & Elm search mount point -->
            <div id="status" class="text-sm"></div>
            <div id="elm-search" class="mt-6"></div>
        </div>
        <!-- ── End Main Card ────────────────────────────────────────── -->

        <!-- Layout toggle -->
        <div class="layout-toggle-row">
            <button onclick="toggleLayout()" id="layoutToggle" class="btn-pill">
                Toggle Layout
            </button>
        </div>

        <!-- ── Tweet Lists ────────────────────────────────────────── -->
        <div id="listsContainer">

            <!-- #SaveSoil Tweets -->
            <div class="section-card">
                <div class="section-header"
                     onclick="toggleSection('searchedTweets')">
                    <div class="section-title-group">
                        <button onclick="showSectionInfo('savesoil', event);"
                                class="icon-btn">
                            <svg aria-hidden="true">
                                <use href="/icons/icons.svg#icon-info"></use>
                            </svg>
                        </button>
                        <h2 class="section-title">#SaveSoil Tweets</h2>
                        <svg id="savesoilArrow" class="collapse-arrow"
                             aria-hidden="true">
                            <use href="/icons/icons.svg#icon-chevron-down"></use>
                        </svg>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="creditBalance"
                              class="credit-badge hidden"></span>
                        <a id="xCreditsLink"
                           href="https://console.x.com/accounts/1037433829038874625/billing/credits"
                           target="_blank"
                           class="x-credits-link hidden"
                           title="View X developer credits">X Credits</a>
                        <button id="refreshButton"
                                onclick="fetchSearchedTweets(); event.stopPropagation();"
                                class="btn-refresh"
                                disabled>
                            <svg aria-hidden="true">
                                <use href="/icons/icons.svg#icon-refresh"></use>
                            </svg>
                            Fetch latest
                        </button>
                    </div>
                </div>
                <div id="searchedTweets" class="section-body hidden"></div>
            </div>

            <!-- Tweet History -->
            <div class="section-card">
                <div class="section-header"
                     onclick="toggleSection('tweetHistory')">
                    <div class="section-title-group">
                        <h2 class="section-title">Tweet History</h2>
                        <svg id="historyArrow" class="collapse-arrow"
                             aria-hidden="true">
                            <use href="/icons/icons.svg#icon-chevron-down"></use>
                        </svg>
                    </div>
                    <button onclick="refreshHistory(); event.stopPropagation();"
                            class="btn-refresh">
                        <svg aria-hidden="true">
                            <use href="/icons/icons.svg#icon-refresh"></use>
                        </svg>
                        Refresh
                    </button>
                </div>
                <div id="tweetHistory" class="section-body hidden"></div>
            </div>

        </div>
        <!-- ── End Tweet Lists ──────────────────────────────────────── -->

    </div>

    <!-- ── Modals (top-level) ────────────────────────────────────── -->

    <!-- Info Modal -->
    <div id="infoModal" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="toggleInfo()" class="modal-close">
                <svg aria-hidden="true">
                    <use href="/icons/icons.svg#icon-x-mark"></use>
                </svg>
            </button>
            <div id="infoContent" class="prose"></div>
        </div>
    </div>

    <!-- Inspiration / ChatGPT / Image Modal -->
    <div id="inspirationModal" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="toggleInspiration()" class="modal-close">
                <svg aria-hidden="true">
                    <use href="/icons/icons.svg#icon-x-mark"></use>
                </svg>
            </button>
            <div class="prose">
                <div id="promptSection">
                    <h2>ChatGPT Prompt</h2>
                    <div class="prompt-box">
                        <p id="gptPrompt" class="prompt-text"></p>
                    </div>
                    <button onclick="sendToChatGPT()" class="btn-send">
                        Send to ChatGPT
                    </button>
                </div>
                <div id="responseSection" class="hidden">
                    <h3 class="mt-4">ChatGPT Response</h3>
                    <div class="response-box">
                        <p id="gptResponse" class="response-text"></p>
                        <button onclick="copyResponse()" class="copy-btn">
                            <svg aria-hidden="true">
                                <use href="/icons/icons.svg#icon-copy"></use>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── End Modals ──────────────────────────────────────────────── -->

</body>
</html>
